name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.10'
          - '1.11'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v2

      - name: Install project deps
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Install lint tools
        run: |
          julia --project=. -e '
            using Pkg
            Pkg.add([
              Pkg.PackageSpec(name="JuliaFormatter", version="2"),
              Pkg.PackageSpec(name="Aqua", version="0.8"),
            ])
          '

      - name: Check formatting
        run: |
          julia --project=. -e '
            using JuliaFormatter
            ok = format("."; verbose=true)
            if !ok
              error("Formatting issues found — run JuliaFormatter.format(\".\") locally")
            end
          '

      - name: Run Aqua
        run: |
          julia --project=. -e '
            using Aqua, LibFEM
            Aqua.test_all(LibFEM; ambiguities=false, stale_deps=false)
          '
