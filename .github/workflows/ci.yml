name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  JULIA_VERSION: "1.12"
  JULIA_PKG_USE_CLI_GIT: true

jobs:
  test:
    name: Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12"
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@d10a6fd8f31b12404a54613ebad242900567f2b9 # v2
      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('**/ci.yml') }}
      - run: sudo apt-get update && sudo apt-get install -y octave
      - run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - run: julia --project=. test/runtests.jl
      - run: julia --project=. scripts/validate_matlab.jl all
