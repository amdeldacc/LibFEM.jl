name: opencode-ollama-cloud

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-ollama-cloud
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    environment: julia-codebase
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure OpenCode for Ollama Cloud
        run: |
          mkdir -p ~/.config/opencode
          mkdir -p ~/.local/share/opencode
          python3 - <<'PY'
          import json
          import os

          config = {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "ollama": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Ollama Cloud",
                "options": {
                  "baseURL": "https://ollama.com/v1"
                },
                "models": {
                  "nemotron-3-nano:30b-cloud": {
                    "tools": True
                  }
                }
              }
            }
          }

          with open(os.path.expanduser("~/.config/opencode/opencode.json"), "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)
              handle.write("\n")
          PY
          python3 - <<PY
import json, os
key = os.environ.get("OLLAMA_API_KEY", "")
config = {
  "$schema": "https://opencode.ai/config.json",
  "provider": {
    "ollama": {
      "npm": "@ai-sdk/openai-compatible",
      "name": "Ollama Cloud",
      "options": {
        "baseURL": "https://ollama.com/v1",
        "apiKey": key
      },
      "models": {
        "nemotron-3-nano:30b-cloud": {
          "tools": True
        }
      }
    }
  }
}
with open(os.path.expanduser("~/.config/opencode/opencode.json"), "w", encoding="utf-8") as f:
    json.dump(config, f, indent=2)
    f.write("\n")

with open(os.path.expanduser("~/.local/share/opencode/auth.json"), "w", encoding="utf-8") as f:
    json.dump({"ollama": {"type":"api","key":key}}, f, indent=2)
    f.write("\n")
PY
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Run OpenCode with Ollama Cloud
        uses: anomalyco/opencode/github@latest
        with:
          model: ollama/nemotron-3-nano:30b-cloud
        env:
          OPENAI_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}