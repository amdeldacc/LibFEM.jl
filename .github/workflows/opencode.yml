name: opencode-ollama-cloud

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-ollama-cloud
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    environment: julia-codebase
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure OpenCode for Ollama Cloud
        run: |
          mkdir -p ~/.config/opencode
          python3 - <<'PY'
          import json
          import os

          config = {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "ollama": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Ollama Cloud",
                "options": {
                  "baseURL": "https://ollama.com/v1",
                  "apiKey": "{env:OLLAMA_API_KEY}"
                },
                "models": {
                  "nemotron-3-super:cloud": {
                    "tools": True
                  }
                }
              }
            }
          }

          with open(os.path.expanduser("~/.config/opencode/opencode.json"), "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)
              handle.write("\n")
          PY

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Configure git auth
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Run OpenCode
        run: opencode github run
        env:
          MODEL: ollama/nemotron-3-super:cloud
          USE_GITHUB_TOKEN: "true"
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
