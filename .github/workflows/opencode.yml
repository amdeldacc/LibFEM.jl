---
name: opencode-nvidia-nim

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

# Minimum default permissions — locked down at top level
permissions: {}

concurrency:
  group: opencode-nvidia-nim
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest
    environment: julia-codebase
    permissions:
      contents: write # push agent branches
      issues: write # comment on issues
      pull-requests: write # create/merge PRs
      # omitted: id-token  -- no OIDC cloud access needed
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 1

      - name: Configure OpenCode for NVIDIA NIM
        run: python3 .github/scripts/configure-opencode.py

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Run OpenCode
        run: opencode github run
        env:
          MODEL: nvidia/deepseek-ai/deepseek-v4-flash
          USE_GITHUB_TOKEN: "true"
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.ACTIONS_PAT }}
