name: opencode-ollama-cloud

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure OpenCode for Ollama Cloud
        run: |
          mkdir -p ~/.config/opencode
          cat << 'EOF' > ~/.config/opencode/opencode.json
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "ollama": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Ollama Cloud",
                "options": {
                  "baseURL": "https://api.ollama-cloud.example/v1"
                },
                "models": {
                  "llama3.1-70b": {
                    "tools": true
                  }
                }
              }
            }
          }
          EOF
        env:
          # Selon la façon dont le client OpenCode passe la clé à l'API,
          # adapte cette variable (OPENAI_API_KEY, OLLAMA_API_KEY, etc.).
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Run OpenCode with Ollama Cloud
        uses: anomalyco/opencode/github@latest
        env:
          # Si OpenCode attend OPENAI_API_KEY pour un provider OpenAI-compatible,
          # tu peux mapper ta clé Ollama Cloud ici :
          OPENAI_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        with:
          model: ollama/llama3.1-70b
          # share: true
          # github_token: ${{ secrets.GITHUB_TOKEN }}
