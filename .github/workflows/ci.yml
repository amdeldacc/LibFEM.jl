name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (Julia ${{ matrix.julia }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        julia:
          - '1.10'
          - '1.11'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}
          
      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia
            ~/.julia/registries
            ~/.julia/artifacts
          key: ${{ runner.os }}-julia-${{ matrix.julia }}-${{ hashFiles('Project.toml', 'Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.julia }}-
            
      - name: Install dependencies
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          
      - name: Run tests
        run: |
          julia --project=. test/runtests.jl

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
          
      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia
            ~/.julia/registries
            ~/.julia/artifacts
          key: ${{ runner.os }}-julia-lint-${{ hashFiles('Project.toml', 'Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-lint-
            
      - name: Install lint dependencies
        run: |
          julia --project=. -e 'using Pkg; Pkg.add(["JuliaFormatter", "Aqua"])'
          
      - name: Run JuliaFormatter
        run: |
          julia --project=. -e 'using JuliaFormatter; format("."; verbose=true)'
          
      - name: Run Aqua (code quality checks)
        run: |
          julia --project=. -e 'using Aqua; Aqua.test_all(LibFEM; ambiguities=false, stale_deps=false)'
