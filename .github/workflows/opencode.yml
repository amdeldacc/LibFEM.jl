name: opencode-ollama-cloud

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-ollama-cloud
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      (github.event.comment.author_association == 'COLLABORATOR' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER')
    runs-on: ubuntu-latest
    environment: julia-codebase
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure OpenCode for Ollama Cloud
        run: |
          mkdir -p ~/.config/opencode
          cat << EOF > ~/.config/opencode/opencode.json
          {
            "\$schema": "https://opencode.ai/config.json",
            "provider": {
              "ollama": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Ollama Cloud",
                "options": {
                  "baseURL": "https://ollama.com/v1",
                  "apiKey": "$OLLAMA_API_KEY"
                },
                "models": {
                  "mistral": {
                    "tools": false
                  }
                }
              }
            }
          }
          EOF
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Run OpenCode with Ollama Cloud
        uses: anomalyco/opencode/github@latest
        env:
          # Map to whichever env var opencode expects for the adapter you used.
          OPENAI_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        with:
          model: nemotron-3-nano:30b
          # share: true
