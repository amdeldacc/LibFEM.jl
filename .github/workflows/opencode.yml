name: opencode-nvidia-nim

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Minimum default permissions — locked down at top level
permissions: {}

concurrency:
  group: opencode-nvidia-nim
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      github.event.comment.author_association == 'OWNER' &&
      (github.event_name == 'pull_request_review_comment' || github.event.issue.pull_request != null)
    runs-on: ubuntu-latest
    environment: julia-codebase
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Configure OpenCode for NVIDIA NIM
        run: |
          mkdir -p ~/.config/opencode
          python3 - <<'PY'
          import json
          import os

          config = {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "nvidia": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "NVIDIA_NIM",
                "options": {
                  "baseURL": "https://integrate.api.nvidia.com/v1",
                  "apiKey": "{env:NVIDIA_API_KEY}",
                  "reasoningEffort": "high",
                  "textVerbosity": "low"
                },
                "models": {
                  "nvidia/nemotron-3-super-120b-a12b": {
                    "tools": True
                  },
                  "nvidia/nemotron-3-ultra-550b-a55b": {
                    "tools": True
                  },
                  "deepseek-ai/deepseek-v4-flash": {
                    "tools": True
                  },
                  "deepseek-ai/deepseek-v4-pro": {
                    "tools": True
                  },
                  "thinkingmachines/inkling": {
                    "tools": True
                  }
                }
              }
            }
          }

          with open(os.path.expanduser("~/.config/opencode/opencode.json"), "w", encoding="utf-8") as handle:
              json.dump(config, handle, indent=2)
              handle.write("\n")
          PY

      - name: Install OpenCode CLI
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Add OpenCode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Run OpenCode
        run: opencode github run
        env:
          MODEL: nvidia/deepseek-ai/deepseek-v4-pro
          USE_GITHUB_TOKEN: "true"
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
