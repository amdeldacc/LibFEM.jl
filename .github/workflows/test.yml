name: Test

on:
  push:
    paths-ignore:
      - 'Doc/**'
      - '**.md'
      - 'openwiki/**'
  pull_request:
    paths-ignore:
      - 'Doc/**'
      - '**.md'
      - 'openwiki/**'

permissions:
  contents: read

jobs:
  test:
    name: Julia ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.12"
        os:
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2
        with:
          cache-registries: "true"

      - name: Cache Julia depot
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: ${{ runner.os }}-julia-${{ matrix.version }}-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ matrix.version }}-

      - run: julia --project=. test/runtests.jl
